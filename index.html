<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
<script>
  window.OneSignalDeferred = window.OneSignalDeferred || [];
  OneSignalDeferred.push(async function(OneSignal) {
    await OneSignal.init({
      appId: "9bf4cb42-b5b7-46ac-9d71-6d9995b9d1e9",
    });

    // ฟังก์ชันสำหรับกดเช็ค ID
    window.checkMyID = async function() {
      const id = await OneSignal.User.PushSubscription.id;
      if (id) {
        alert("ID เครื่องของคุณคือ:\n" + id);
      } else {
        alert("ยังไม่มี ID กรุณากดปุ่ม 'กระดิ่ง' เพื่ออนุญาตแจ้งเตือนก่อนครับ");
        OneSignal.Slidedown.promptPush(); // บังคับให้หน้าต่างขออนุญาตเด้งขึ้นมา
      }
    };
  });
</script>

<button onclick="checkMyID()" style="position:fixed; bottom:20px; right:20px; z-index:9999; padding:10px; background:#4f46e5; color:white; border-radius:5px; border:none;">
  เช็ค ID แจ้งเตือน
</button>
